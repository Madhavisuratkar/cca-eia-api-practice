[UploadByOrg]
get_uploads = SELECT organisation, user_name, COUNT(DISTINCT file_path) AS uploads
    FROM {table_name}
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY GROUPING SETS ((organisation), (organisation, user_name));

[TotalSavings]
get_cca_savings = SELECT organisation, user_name,
        SUM("hourly cost optimization total savings") AS hourly_cost,
        SUM("modernize total savings") AS modernize,
        SUM("modernize & downsize total savings") AS downsize
    FROM cca_recommendation
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY GROUPING SETS ((organisation), (organisation, user_name));

get_eia_savings = SELECT 
        organisation, 
        user_name, 
        GREATEST(SUM("monthly savings i"), 0) AS monthly_savings_i,
        GREATEST(SUM("monthly savings ii"), 0) AS monthly_savings_ii,
        GREATEST(SUM("monthly savings iii"), 0) AS monthly_savings_iii
    FROM eia_recommendation
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY organisation, user_name;

[FeaturesCount]
get_feature_count = SELECT 
    organisation, endpoint, COUNT(*) AS endpoint_call_count
    FROM {table_name}
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY organisation, endpoint;

[PerformanceCount]
get_performance_count = SELECT
    organisation,
    AVG("perf enhancement i") AS perf_enhancement_i,
    AVG("perf enhancement ii") AS perf_enhancement_ii,
    AVG("perf enhancement iii") AS perf_enhancement_iii,
    (AVG("perf enhancement i") + AVG("perf enhancement ii") + AVG("perf enhancement iii")) / 3 AS avg_perf_enhancement
    FROM {table_name}
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY organisation;

[UsersByOrg]
get_users_by_org = SELECT organisation, COUNT(DISTINCT user_name) 
    FROM {table_name} 
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY organisation;

[UploadTrend]
get_upload_trend = SELECT date, COUNT(distinct file_name) AS upload_count
    FROM {table_name}
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY date;

[LoggedInUsers]
get_logged_in_users = SELECT date, COUNT(DISTINCT user_name) AS login_count
    FROM {endpoint_table_name}
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY date;

[InstanceWithNoRecommendation]
get_instances_no_recommendation = SELECT csp, zone, "skipped instance", 
    COUNT("skipped instance") AS skipped_instance_count
    FROM {table_name} 
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY csp, zone, "skipped instance";

[UserActivity]
get_active_users = SELECT organisation, user_name, COUNT(*) AS login_count
    FROM {table_name}
    WHERE date::DATE >= CURRENT_DATE - INTERVAL '60 days'
    AND app_name = '{app_name}' {ignore}
    GROUP BY organisation, user_name;

get_inactive_users = SELECT organisation, user_name, COUNT(*) AS login_count
    FROM {table_name}
    WHERE date::DATE < CURRENT_DATE - INTERVAL '60 days'
    AND app_name = '{app_name}' {ignore}
    GROUP BY organisation, user_name;

get_users_with_date_filter = SELECT organisation, user_name, COUNT(DISTINCT user_name) AS login_count
    FROM {table_name}
    WHERE date::DATE {date_condition} CURRENT_DATE - INTERVAL '{days} days'
    AND app_name = '{app_name}' {ignore}
    GROUP BY organisation, user_name;

get_inactive_users_with_date_filter = SELECT TO_CHAR(DATE_TRUNC('month', DATE(datetime)), 'Mon') AS month, organisation, user_name, COUNT(DISTINCT user_name) AS login_count
    FROM {table_name}
    WHERE datetime <= NOW() - INTERVAL '180 days'
    AND app_name = '{app_name}' {ignore}
    GROUP BY month, organisation, user_name;


[CarbonInstance]
carbon_query = 
    SELECT 
        organisation, SUM(emission_i) AS carbon_i,
        SUM(emission_ii) AS carbon_ii,
        SUM(emission_iii) AS carbon_iii
    FROM eia_recommendation
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY organisation;

energy_query = 
    SELECT 
        organisation, SUM(energy_cons_i) AS energy_i,
        SUM(energy_cons_ii) AS energy_ii,
        SUM(energy_cons_iii) AS energy_iii
    FROM eia_recommendation
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY organisation;

[VcpuCount]
vcpu_count = 
    SELECT
        "vcpu",
        "vcpu i",
        "vcpu ii",
        "vcpu iii",
        COUNT("vcpu") AS vCPU_count,
        COUNT("vcpu i") AS vCPU_i_count,
        COUNT("vcpu ii") AS vCPU_ii_count,
        COUNT("vcpu iii") AS vCPU_iii_count,
        organisation
    FROM {table_name} 
    WHERE 1=1 {ignore} AND {date_filter}
    GROUP BY "vcpu", "vcpu i", "vcpu ii", "vcpu iii",organisation;
